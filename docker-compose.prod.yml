# Production deployment stack. Runs on agregat (or any Linux host with Docker).
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec app node scripts/migrate.cjs
#
# Reads secrets from .env (POSTGRES_PASSWORD, AUTH_SECRET, GOOGLE_*, OWNER_EMAIL).
# Postgres is NOT exposed to the host network — only the app container reaches it.
# App is exposed only on 127.0.0.1:3001 — nginx reverse proxies from there.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lead
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
      POSTGRES_DB: lead
    # Bind to loopback only — Hetzner firewall already blocks public 5432 but
    # belt-and-braces. Useful so host-side `pnpm db:migrate` can connect.
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lead -d lead']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to reach postgres via the docker-network alias.
      # The .env's DATABASE_URL points at localhost:5432 so host-side
      # `pnpm db:migrate` works; inside the container we route through the
      # `postgres` service name instead.
      DATABASE_URL: postgres://lead:${POSTGRES_PASSWORD}@postgres:5432/lead
    ports:
      - '127.0.0.1:3001:3000'
    volumes:
      - app-storage:/app/storage

volumes:
  postgres-data:
  app-storage:
