# Production deployment stack. Runs on agregat (or any Linux host with Docker).
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec app node scripts/migrate.cjs
#
# Reads secrets from .env (POSTGRES_PASSWORD, AUTH_SECRET, GOOGLE_*, OWNER_EMAIL).
# Postgres is NOT exposed to the host network — only the app container reaches it.
# App is exposed only on 127.0.0.1:3001 — nginx reverse proxies from there.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lead
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
      POSTGRES_DB: lead
    # Bind to loopback only — Hetzner firewall already blocks public 5432 but
    # belt-and-braces. Host port :5433 not :5432 because agregat has another
    # postgres on :5432 (used by an unrelated app); we don't want to fight it.
    # The app container reaches us via docker DNS at postgres:5432, so the
    # host-port choice only matters for host-side `pnpm db:migrate` etc.
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lead -d lead']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Loopback only on the host; the app container reaches it via the
    # docker network alias `redis`.
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DATABASE_URL + REDIS_URL to reach the docker-network
      # service hostnames. The .env's DATABASE_URL/REDIS_URL point at
      # localhost so host-side `pnpm db:migrate` and bullmq inspectors work.
      DATABASE_URL: postgres://lead:${POSTGRES_PASSWORD}@postgres:5432/lead
      REDIS_URL: redis://redis:6379
    # Defined here (not in docker-compose.yml) because compose merges port
    # lists rather than overriding — putting it in both files would publish
    # the container on multiple ports.
    ports:
      - '127.0.0.1:3001:3000'
    volumes:
      - app-storage:/app/storage

volumes:
  postgres-data:
  redis-data:
  app-storage:
